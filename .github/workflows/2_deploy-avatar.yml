name: 2_ Deploy Avatar

on:
  workflow_dispatch:
    inputs:
      step:
        description: "Which step to run"
        required: true
        type: choice
        options:
          - deploy
          - get-credentials
          - deploy-chatbot
          - all
        default: all

jobs:
  deploy-avatar:
    name: Deploy Avatar VS Agent and Chatbot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::This workflow can only run on the main branch (current: ${GITHUB_REF_NAME})"
            exit 1
          fi
          echo "NETWORK=testnet" >> "$GITHUB_ENV"

      - name: Load configuration
        run: |
          set -a
          source avatar/config.env
          set +a
          while IFS= read -r line; do
            key="${line%%=*}"
            echo "${key}=${!key}" >> "$GITHUB_ENV"
          done < <(grep -E '^[A-Z_]+=' avatar/config.env)

      - name: Parse deployment.yaml
        run: |
          CHART_SOURCE=$(yq '.chartSource' avatar/deployment.yaml)
          CHART_VERSION=$(yq '.chartVersion' avatar/deployment.yaml)
          CHART_NAMESPACE="${{ secrets.K8S_NAMESPACE }}"
          RELEASE_NAME=$(yq '.name' avatar/deployment.yaml)
          INGRESS_HOST=$(yq '.ingress.host' avatar/deployment.yaml)
          echo "CHART_SOURCE=${CHART_SOURCE}" >> "$GITHUB_ENV"
          echo "CHART_VERSION=${CHART_VERSION}" >> "$GITHUB_ENV"
          echo "CHART_NAMESPACE=${CHART_NAMESPACE}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> "$GITHUB_ENV"
          echo "INGRESS_HOST=${INGRESS_HOST}" >> "$GITHUB_ENV"

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          cat > ~/.kube/config <<'KUBEEOF'
          ${{ secrets.OVH_KUBECONFIG }}
          KUBEEOF

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.9'

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Install veranad
        run: |
          VERANAD_VERSION="v0.9.4"
          curl -sfL "https://github.com/verana-labs/verana/releases/download/${VERANAD_VERSION}/veranad-linux-amd64" \
            -o /usr/local/bin/veranad
          chmod +x /usr/local/bin/veranad
          veranad version

      - name: Import account from mnemonic
        run: |
          echo "${{ secrets.VS_DEMO_MNEMONIC }}" | veranad keys add "${{ env.USER_ACC }}" --recover --keyring-backend test

      # -----------------------------------------------------------------------
      # DEPLOY: Install/upgrade VS Agent via Helm
      # -----------------------------------------------------------------------
      - name: Create VS Agent DB secret
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          VSAGENT_DB_PWD="${{ secrets.VSAGENT_DB_PASSWORD }}"
          if [ -z "$VSAGENT_DB_PWD" ]; then
            VSAGENT_DB_PWD="$(openssl rand -hex 16)"
            echo "::warning::VSAGENT_DB_PASSWORD secret not set — using generated password"
          fi
          kubectl create secret generic avatar-db-secret \
            --namespace "$CHART_NAMESPACE" \
            --from-literal=POSTGRES_PASSWORD="$VSAGENT_DB_PWD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy VS Agent via Helm
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          APP_NAME="issuer-chatbot-app"
          CHATBOT_URL="http://${APP_NAME}:${CHATBOT_PORT:-4000}"
          yq 'del(.chartSource, .chartVersion)' avatar/deployment.yaml > /tmp/helm-values.yaml
          yq -i '.didcommLabel = env(SERVICE_NAME)' /tmp/helm-values.yaml
          yq -i '.didcommInvitationImageUrl = env(SERVICE_LOGO_URL)' /tmp/helm-values.yaml
          export CHATBOT_URL
          yq -i '.eventsBaseUrl = env(CHATBOT_URL)' /tmp/helm-values.yaml
          helm upgrade --install "$RELEASE_NAME" "$CHART_SOURCE" \
            --version "$CHART_VERSION" \
            --namespace "$CHART_NAMESPACE" --create-namespace \
            --values /tmp/helm-values.yaml \
            --wait --timeout 300s

      # -----------------------------------------------------------------------
      # GET-CREDENTIALS: Obtain Service credential + ISSUER permission
      # -----------------------------------------------------------------------
      - name: Port-forward child VS Agent
        if: inputs.step == 'get-credentials' || inputs.step == 'all'
        run: |
          kubectl port-forward -n "$CHART_NAMESPACE" "svc/$RELEASE_NAME" 3002:3000 &
          echo "CHILD_PF_PID=$!" >> "$GITHUB_ENV"
          sleep 5
          curl -sf http://localhost:3002/v1/agent > /dev/null || {
            echo "::error::Port-forward to child VS-Agent failed"
            exit 1
          }
          echo "Port-forward to child VS-Agent on :3002"

      - name: Port-forward organization Agent
        if: inputs.step == 'get-credentials' || inputs.step == 'all'
        run: |
          kubectl port-forward -n "$CHART_NAMESPACE" "svc/organization" 3000:3000 &
          echo "ORG_PF_PID=$!" >> "$GITHUB_ENV"
          sleep 5
          curl -sf http://localhost:3000/v1/agent > /dev/null || {
            echo "::error::Port-forward to organization-Agent failed"
            exit 1
          }
          echo "Port-forward to organization-Agent on :3000"

      - name: Get Service credential and ISSUER permission
        if: inputs.step == 'get-credentials' || inputs.step == 'all'
        run: |
          ORG_ADMIN_API="http://localhost:3000"
          CHILD_ADMIN_API="http://localhost:3002"
          source common/common.sh
          set_network_vars "$NETWORK"

          CHILD_DID=$(curl -sf "${CHILD_ADMIN_API}/v1/agent" | jq -r '.publicDid')
          echo "Child DID: $CHILD_DID"

          # Get Service credential from organization (skip if already linked)
          CHILD_PUBLIC_URL="https://${INGRESS_HOST}"
          if has_linked_vp "$CHILD_PUBLIC_URL" "service"; then
            ok "Service credential already linked — skipping"
          else
            SERVICE_VTJSC_OUTPUT=$(discover_ecs_vtjsc "$ECS_TR_PUBLIC_URL" "service")
            SERVICE_JSC_URL=$(echo "$SERVICE_VTJSC_OUTPUT" | sed -n '1p')

            download_logo_data_uri "$SERVICE_LOGO_URL" > /tmp/service_logo_data_uri

            SERVICE_CLAIMS=$(jq -n \
              --rawfile logo /tmp/service_logo_data_uri \
              --arg id "$CHILD_DID" \
              --arg name "$SERVICE_NAME" \
              --arg type "${SERVICE_TYPE:-IssuerService}" \
              --arg desc "$SERVICE_DESCRIPTION" \
              --argjson age "${SERVICE_MIN_AGE:-0}" \
              --arg terms "${SERVICE_TERMS:-}" \
              --arg privacy "${SERVICE_PRIVACY:-}" \
              '{id: $id, name: $name, type: $type, description: $desc, logo: ($logo | rtrimstr("\n")), minimumAgeRequired: $age, termsAndConditions: $terms, privacyPolicy: $privacy}')

            issue_remote_and_link "$ORG_ADMIN_API" "$CHILD_ADMIN_API" "service" "$SERVICE_JSC_URL" "$CHILD_DID" "$SERVICE_CLAIMS"
          fi

          # Discover custom schema from organization DID doc
          ORG_PUBLIC_URL="https://organization.eafit.testnet.verana.network"

          ORG_DID_DOC=$(curl -sf "${ORG_PUBLIC_URL}/.well-known/did.json")
          CUSTOM_VP_URL=$(echo "$ORG_DID_DOC" | jq -r '
            .service[] |
            select(.type == "LinkedVerifiablePresentation") |
            select(.id | test("organization-jsc-vp|service-jsc-vp") | not) |
            select(.id | test("jsc-vp")) |
            .serviceEndpoint' | head -1)

          if [ -z "$CUSTOM_VP_URL" ]; then
            echo "::error::No custom schema VP found in organization DID doc. Has the trust registry been created?"
            exit 1
          fi
          CUSTOM_VP=$(curl -sf "$CUSTOM_VP_URL")
          CUSTOM_SCHEMA_REF=$(echo "$CUSTOM_VP" | jq -r '.verifiableCredential[0].credentialSubject.jsonSchema."$ref" // empty')
          CUSTOM_SCHEMA_ID=$(echo "$CUSTOM_SCHEMA_REF" | grep -oE '[0-9]+$')
          ok "Organization custom schema ID: $CUSTOM_SCHEMA_ID"

          # Obtain ISSUER permission via VP flow
          if EXISTING_PERM=$(find_active_issuer_perm "$CUSTOM_SCHEMA_ID" "$CHILD_DID"); then
            ok "Active ISSUER permission already exists: $EXISTING_PERM — skipping"
          else
            ROOT_PERM_ID=$(discover_active_root_perm "$CUSTOM_SCHEMA_ID")
            check_balance "$USER_ACC"

            START_RESULT=$(veranad tx perm start-perm-vp \
              issuer "$ROOT_PERM_ID" \
              --did "$CHILD_DID" \
              --from "$USER_ACC" --chain-id "$CHAIN_ID" --keyring-backend test \
              --fees "$FEES" --gas auto --node "$NODE_RPC" \
              --output json -y 2>&1 | extract_tx_json)
            START_TX_HASH=$(echo "$START_RESULT" | jq -r '.txhash // empty')
            if [ -z "$START_TX_HASH" ]; then
              echo "::error::Failed to start ISSUER VP"
              exit 1
            fi
            sleep 8
            ISSUER_PERM=$(extract_tx_event "$START_TX_HASH" "start_permission_vp" "permission_id")
            if [ -z "$ISSUER_PERM" ]; then
              sleep 6
              ISSUER_PERM=$(extract_tx_event "$START_TX_HASH" "start_permission_vp" "permission_id")
            fi

            check_balance "$USER_ACC"
            veranad tx perm set-perm-vp-validated \
              "$ISSUER_PERM" \
              --from "$USER_ACC" --chain-id "$CHAIN_ID" --keyring-backend test \
              --fees "$FEES" --gas auto --node "$NODE_RPC" \
              --output json -y
            sleep 6
            ok "ISSUER permission validated: $ISSUER_PERM"
          fi

          # Create AnonCreds credential definition (if enabled and not already created)
          if [ "${ENABLE_ANONCREDS}" = "true" ]; then
            CHILD_PUBLIC_API="http://localhost:${VS_AGENT_PUBLIC_PORT:-3001}"
            # Port-forward the public port too
            kubectl port-forward -n "$CHART_NAMESPACE" "svc/$RELEASE_NAME" 3001:3001 &
            CHILD_PUBLIC_PF_PID=$!
            sleep 3

            EXISTING_ANONCREDS=$(curl -sf "http://localhost:3001/resources?resourceType=anonCredsCredDef" \
              | jq -r '. | length' 2>/dev/null || echo "0")
            if [ "${EXISTING_ANONCREDS:-0}" -gt 0 ]; then
              ANONCREDS_CRED_DEF_ID=$(curl -sf "http://localhost:3001/resources?resourceType=anonCredsCredDef" \
                | jq -r '.[0].id // empty' 2>/dev/null || echo "")
              ok "AnonCreds credential definition already exists: ${ANONCREDS_CRED_DEF_ID} — skipping"
            else
              # Find the VTJSC for the custom schema
              VTJSC_VPR_REF="vpr:verana:${CHAIN_ID}/cs/v1/js/${CUSTOM_SCHEMA_ID}"
              VTJSC_CRED_ID=$(curl -sf "${CHILD_ADMIN_API}/v1/credentials" \
                | jq -r --arg ref "$VTJSC_VPR_REF" \
                  '[.[] | select(.credential.credentialSubject.jsonSchema."$ref" == $ref)][0].id // empty')
              if [ -z "$VTJSC_CRED_ID" ]; then
                echo "::error::No VTJSC credential found for schema ref ${VTJSC_VPR_REF}"
                exit 1
              fi
              ANONCREDS_RESULT=$(curl -sf -X POST "${CHILD_ADMIN_API}/v1/anoncreds/credential-definitions" \
                -H "Content-Type: application/json" \
                -d "{\"name\": \"${ANONCREDS_NAME}\", \"version\": \"${ANONCREDS_VERSION}\", \"relatedJsonSchemaCredentialId\": \"${VTJSC_CRED_ID}\", \"supportRevocation\": ${ANONCREDS_SUPPORT_REVOCATION}}")
              ANONCREDS_CRED_DEF_ID=$(echo "$ANONCREDS_RESULT" | jq -r '.id // empty')
              if [ -z "$ANONCREDS_CRED_DEF_ID" ]; then
                echo "::error::Failed to create AnonCreds credential definition. Response: $ANONCREDS_RESULT"
                exit 1
              fi
              ok "AnonCreds credential definition created: $ANONCREDS_CRED_DEF_ID"
            fi
            echo "ANONCREDS_CRED_DEF_ID=${ANONCREDS_CRED_DEF_ID}" >> "$GITHUB_ENV"
            kill "$CHILD_PUBLIC_PF_PID" 2>/dev/null || true
          fi

      # -----------------------------------------------------------------------
      # DEPLOY-CHATBOT: Deploy Issuer Chatbot service (pre-built image)
      # -----------------------------------------------------------------------
      - name: Deploy Issuer Chatbot
        if: inputs.step == 'deploy-chatbot' || inputs.step == 'all'
        run: |
          NAMESPACE="${CHART_NAMESPACE}"
          APP_NAME="issuer-chatbot-app"
          IMAGE="${CHATBOT_IMAGE:-io2060/avatar-issuer-chatbot:latest}"
          PORT="${CHATBOT_PORT:-4000}"

          DB_NAME="issuer-chatbot-db"
          DB_PASSWORD="${{ secrets.CHATBOT_DB_PASSWORD }}"

          MINIO_NAME="issuer-chatbot-minio"
          MINIO_AK="${{ secrets.MINIO_ACCESS_KEY }}"
          MINIO_SK="${{ secrets.MINIO_SECRET_KEY }}"
          MINIO_BUCKET="avatar-previews"
          MINIO_PUBLIC_HOST="media.avatar.eafit.testnet.verana.network"
          if [ -z "$MINIO_AK" ]; then
            MINIO_AK="$(openssl rand -hex 12)"
            echo "::warning::MINIO_ACCESS_KEY secret not set — using generated key"
          fi
          if [ -z "$MINIO_SK" ]; then
            MINIO_SK="$(openssl rand -hex 16)"
            echo "::warning::MINIO_SECRET_KEY secret not set — using generated key"
          fi
          if [ -z "$DB_PASSWORD" ]; then
            DB_PASSWORD="$(openssl rand -hex 16)"
            echo "::warning::CHATBOT_DB_PASSWORD secret not set — using generated password"
          fi

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: ${DB_NAME}-data
            namespace: ${NAMESPACE}
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 2Gi
            storageClassName: csi-cinder-high-speed
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${DB_NAME}
            namespace: ${NAMESPACE}
            labels:
              app: ${DB_NAME}
          spec:
            replicas: 1
            strategy:
              type: Recreate
            selector:
              matchLabels:
                app: ${DB_NAME}
            template:
              metadata:
                labels:
                  app: ${DB_NAME}
              spec:
                containers:
                  - name: postgres
                    image: postgres:16-alpine
                    ports:
                      - containerPort: 5432
                    env:
                      - name: POSTGRES_DB
                        value: chatbot
                      - name: POSTGRES_USER
                        value: chatbot
                      - name: POSTGRES_PASSWORD
                        value: "${DB_PASSWORD}"
                      - name: PGDATA
                        value: /var/lib/postgresql/data/pgdata
                    volumeMounts:
                      - name: pgdata
                        mountPath: /var/lib/postgresql/data
                    resources:
                      requests:
                        cpu: 50m
                        memory: 128Mi
                      limits:
                        cpu: 250m
                        memory: 256Mi
                volumes:
                  - name: pgdata
                    persistentVolumeClaim:
                      claimName: ${DB_NAME}-data
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${DB_NAME}
            namespace: ${NAMESPACE}
          spec:
            selector:
              app: ${DB_NAME}
            ports:
              - port: 5432
                targetPort: 5432
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${MINIO_NAME}
            namespace: ${NAMESPACE}
            labels:
              app: ${MINIO_NAME}
          spec:
            replicas: 1
            strategy:
              type: Recreate
            selector:
              matchLabels:
                app: ${MINIO_NAME}
            template:
              metadata:
                labels:
                  app: ${MINIO_NAME}
              spec:
                containers:
                  - name: minio
                    image: minio/minio:latest
                    args: ["server", "/data", "--console-address", ":9001"]
                    ports:
                      - containerPort: 9000
                      - containerPort: 9001
                    env:
                      - name: MINIO_ROOT_USER
                        value: "${MINIO_AK}"
                      - name: MINIO_ROOT_PASSWORD
                        value: "${MINIO_SK}"
                      - name: MINIO_BROWSER
                        value: "off"
                    volumeMounts:
                      - name: data
                        mountPath: /data
                    resources:
                      requests:
                        cpu: 25m
                        memory: 64Mi
                      limits:
                        cpu: 200m
                        memory: 256Mi
                volumes:
                  - name: data
                    emptyDir: {}
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${MINIO_NAME}
            namespace: ${NAMESPACE}
          spec:
            selector:
              app: ${MINIO_NAME}
            ports:
              - name: api
                port: 9000
                targetPort: 9000
              - name: console
                port: 9001
                targetPort: 9001
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${MINIO_NAME}
            namespace: ${NAMESPACE}
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              nginx.ingress.kubernetes.io/proxy-body-size: "10m"
          spec:
            ingressClassName: nginx
            tls:
              - hosts:
                  - ${MINIO_PUBLIC_HOST}
                secretName: ${MINIO_PUBLIC_HOST}-cert
            rules:
              - host: ${MINIO_PUBLIC_HOST}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: ${MINIO_NAME}
                          port:
                            number: 9000
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${APP_NAME}
            namespace: ${NAMESPACE}
            labels:
              app: ${APP_NAME}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${APP_NAME}
            template:
              metadata:
                labels:
                  app: ${APP_NAME}
                annotations:
                  deploy-timestamp: "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              spec:
                containers:
                  - name: issuer-chatbot
                    image: ${IMAGE}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: ${PORT}
                    env:
                      - name: VS_AGENT_ADMIN_URL
                        value: "http://${RELEASE_NAME}:3000"
                      - name: ORG_VS_ADMIN_URL
                        value: "http://organization:3000"
                      - name: ORG_VS_PUBLIC_URL
                        value: "https://organization.eafit.testnet.verana.network"
                      - name: CHATBOT_PORT
                        value: "${PORT}"
                      - name: DATABASE_URL
                        value: "postgresql://chatbot:${DB_PASSWORD}@${DB_NAME}:5432/chatbot"
                      - name: SERVICE_NAME
                        value: "${SERVICE_NAME}"
                      - name: CUSTOM_SCHEMA_BASE_ID
                        value: "${CUSTOM_SCHEMA_BASE_ID:-avatar-eafit}"
                      - name: ENABLE_ANONCREDS
                        value: "${ENABLE_ANONCREDS:-true}"
                      - name: LOG_LEVEL
                        value: "${LOG_LEVEL:-info}"
                      - name: MINIO_ENDPOINT
                        value: "${MINIO_NAME}"
                      - name: MINIO_PORT
                        value: "9000"
                      - name: MINIO_ACCESS_KEY
                        value: "${MINIO_AK}"
                      - name: MINIO_SECRET_KEY
                        value: "${MINIO_SK}"
                      - name: MINIO_BUCKET
                        value: "${MINIO_BUCKET}"
                      - name: MINIO_USE_SSL
                        value: "false"
                      - name: MINIO_PUBLIC_URL
                        value: "https://${MINIO_PUBLIC_HOST}"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${APP_NAME}
            namespace: ${NAMESPACE}
          spec:
            selector:
              app: ${APP_NAME}
            ports:
              - port: ${PORT}
                targetPort: ${PORT}
          EOF

          kubectl rollout status deployment/"${APP_NAME}" -n "$NAMESPACE" --timeout=300s

      # -----------------------------------------------------------------------
      # CLEANUP
      # -----------------------------------------------------------------------
      - name: Stop port-forwards
        if: always()
        run: |
          [ -n "${CHILD_PF_PID:-}" ] && kill "$CHILD_PF_PID" 2>/dev/null || true
          [ -n "${ORG_PF_PID:-}" ] && kill "$ORG_PF_PID" 2>/dev/null || true

      - name: Summary
        if: always()
        run: |
          echo "## Avatar" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${INGRESS_HOST:-}" ]; then
            echo "- **VS Agent:** https://${INGRESS_HOST}/.well-known/did.json" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- **Network:** testnet" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${ANONCREDS_CRED_DEF_ID:-}" ]; then
            echo "- **Credential Definition:** ${ANONCREDS_CRED_DEF_ID}" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ inputs.step }}" = "deploy-chatbot" ] || [ "${{ inputs.step }}" = "all" ]; then
            echo "- **Chatbot Image:** ${CHATBOT_IMAGE:-io2060/avatar-issuer-chatbot:latest}" >> "$GITHUB_STEP_SUMMARY"
          fi
